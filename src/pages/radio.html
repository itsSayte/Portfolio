<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Live</title>
    <link rel="stylesheet" href="/src/css/radio.css">
</head>
<body>

    <header class="nav-back">
        <a href="/index.html" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none">
                <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Retour</span>
        </a>
    </header>

    <main class="content-wrapper">
        <div class="text-header">
            <h1>Radio Jazz</h1>
            <p>Diffusion en direct</p>
        </div>

        <div class="player">
            <button id="playBtn" class="btn">
                <svg id="playIcon" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            </button>

            <input id="volume" type="range" min="0" max="1" step="0.01" value="1">
        </div>
    </main>

    <audio id="radio" src="https://stream.srg-ssr.ch/m/rsj/mp3_128"></audio>

    <script src="/src/js/radio.js"></script>
</body>
</html>
